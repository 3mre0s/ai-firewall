name: Bug report
description: Report reproducible incorrect behavior that is not a private security vulnerability.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Never include real credentials or personal data. Report exploitable vulnerabilities through SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Linux, macOS Apple Silicon, macOS Intel, Windows, Other]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Provide a minimal reproduction using synthetic values only.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
