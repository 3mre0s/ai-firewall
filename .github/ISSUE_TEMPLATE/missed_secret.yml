name: Missed secret pattern
description: Report a supported-looking value that was not detected
title: "[Missed secret]: "
body:
  - type: markdown
    attributes:
      value: |
        Never submit the original secret. Provide only a synthetic, non-working value with the same format. Do not include customer data, private repository content, credentials, or tokens.
  - type: input
    id: category
    attributes:
      label: Secret category
      placeholder: API key, file path, email, password assignment
    validations:
      required: true
  - type: textarea
    id: synthetic
    attributes:
      label: Synthetic value with the same format
      description: The value must be fake, non-working, and safe to publish.
      placeholder: sk-test-not-a-real-key-000000
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Minimal synthetic context
      description: Show only the minimum sanitized text needed to reproduce the miss.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ai-firewall version`.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I confirm every submitted value is synthetic and contains no real secret, credential, token, customer data, or private repository content.
          required: true
