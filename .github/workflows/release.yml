name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required for manual runs."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: ai-firewall-linux-amd64
            archive: ai-firewall-linux-amd64.tar.gz
            archive_type: tar
          - goos: linux
            goarch: arm64
            binary: ai-firewall-linux-arm64
            archive: ai-firewall-linux-arm64.tar.gz
            archive_type: tar
          - goos: darwin
            goarch: amd64
            binary: ai-firewall-darwin-amd64
            archive: ai-firewall-darwin-amd64.tar.gz
            archive_type: tar
          - goos: darwin
            goarch: arm64
            binary: ai-firewall-darwin-arm64
            archive: ai-firewall-darwin-arm64.tar.gz
            archive_type: tar
          - goos: windows
            goarch: amd64
            binary: ai-firewall-windows-amd64.exe
            archive: ai-firewall-windows-amd64.zip
            archive_type: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: test
        run: go test ./... -count=1

      - name: build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${{ github.event.inputs.tag || github.ref_name }}" -o "dist/${{ matrix.binary }}" .

      - name: package
        run: |
          cd dist
          if [ "${{ matrix.archive_type }}" = "tar" ]; then
            tar -czf "${{ matrix.archive }}" "${{ matrix.binary }}"
          else
            zip "${{ matrix.archive }}" "${{ matrix.binary }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 7

  vsix:
    name: package vsix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install vsce
        run: npm install -g @vscode/vsce@2.32.0

      - name: package
        working-directory: extensions/vscode
        run: |
          mkdir -p ../../dist
          vsce package --out ../../dist/local-ai-firewall.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: local-ai-firewall-vsix
          path: dist/local-ai-firewall.vsix
          if-no-files-found: error
          retention-days: 7

  release:
    name: github release
    needs: [build, vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: generate checksums.txt
        run: |
          cd dist
          sha256sum \
            ai-firewall-linux-amd64.tar.gz \
            ai-firewall-linux-arm64.tar.gz \
            ai-firewall-darwin-amd64.tar.gz \
            ai-firewall-darwin-arm64.tar.gz \
            ai-firewall-windows-amd64.zip \
            local-ai-firewall.vsix \
            > checksums.txt
          cat checksums.txt

      - name: resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: true
          generate_release_notes: true
          files: |
            dist/ai-firewall-linux-amd64.tar.gz
            dist/ai-firewall-linux-arm64.tar.gz
            dist/ai-firewall-darwin-amd64.tar.gz
            dist/ai-firewall-darwin-arm64.tar.gz
            dist/ai-firewall-windows-amd64.zip
            dist/local-ai-firewall.vsix
            dist/checksums.txt
