name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Required for manual runs."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            asset: ai-firewall-linux-amd64
          - goos: darwin
            goarch: amd64
            ext: ""
            asset: ai-firewall-darwin-amd64
          - goos: darwin
            goarch: arm64
            ext: ""
            asset: ai-firewall-darwin-arm64
          - goos: windows
            goarch: amd64
            ext: ".exe"
            asset: ai-firewall-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go test
        run: go test ./...

      - name: build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/${{ matrix.asset }}" .

      - name: sha256
        run: |
          cd dist
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.asset }}.sha256
          if-no-files-found: error
          retention-days: 7

  vsix:
    name: package vsix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install vsce
        run: npm install -g @vscode/vsce@2.32.0

      - name: package
        working-directory: extensions/vscode
        run: vsce package --out ../../dist/local-ai-firewall.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: local-ai-firewall-vsix
          path: dist/local-ai-firewall.vsix
          if-no-files-found: error
          retention-days: 7

  release:
    name: github release
    needs: [build, vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: aggregate checksums
        run: |
          cd dist
          sha256sum ai-firewall-* local-ai-firewall.vsix > checksums.txt
          ls -la

      - name: resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: true
          generate_release_notes: true
          files: |
            dist/ai-firewall-linux-amd64
            dist/ai-firewall-linux-amd64.sha256
            dist/ai-firewall-darwin-amd64
            dist/ai-firewall-darwin-amd64.sha256
            dist/ai-firewall-darwin-arm64
            dist/ai-firewall-darwin-arm64.sha256
            dist/ai-firewall-windows-amd64.exe
            dist/ai-firewall-windows-amd64.exe.sha256
            dist/local-ai-firewall.vsix
            dist/checksums.txt
