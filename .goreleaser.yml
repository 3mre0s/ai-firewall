version: 2

project_name: anonmyz
dist: .release-dist

builds:
  - id: anonmyz
    main: .
    binary: anonmyz
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
  - id: ai-firewall-compat
    main: .
    binary: ai-firewall
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: anonmyz
    ids:
      - anonmyz
    name_template: "anonmyz-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
  - id: ai-firewall-compat
    ids:
      - ai-firewall-compat
    name_template: "ai-firewall-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
  algorithm: sha256
  extra_files:
    - glob: dist/local-ai-firewall.vsix

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs(?:\(.+\))?:'
      - '^test(?:\(.+\))?:'
      - '^chore(?:\(.+\))?:'

release:
  draft: true
  replace_existing_draft: true
  extra_files:
    - glob: dist/local-ai-firewall.vsix
